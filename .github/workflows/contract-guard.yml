name: Contract Guard

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  no-free-dict-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run contract guard
        run: uv run pytest -q tests/unit/ingestion/test_contract_guard_no_free_dict_payload.py
